              "html": "<div style=\"font-family: serif; max-width: 680px; margin: 0 auto; color: #111; line-height: 1.6;\"><h2 style=\"font-size: 20px; border-bottom: 1px solid #ddd; padding-bottom: 8px;\">Snorkel AI — Terminal Bench 2.0 Brief</h2><p><strong>Status as of May 13:</strong> mNDA signed by both parties. SOW received 8:18 PM from Dillon Gallus. They are waiting on your cohort proposal and pricing.</p><p><strong>Notion page:</strong> <a href=\"https://www.notion.so/3601c39f6a2081e0ba90d720d1ce8d60\">Terminal Bench 2.0 — SOW Analysis + Response Strategy</a></p><hr style=\"margin: 24px 0;\"><h3 style=\"font-size: 16px;\">What Terminal Bench 2.0 Is</h3><p>Snorkel'"'"'s benchmark for evaluating coding and terminal agents. Contributors execute multi-step tasks inside pre-configured Dockerized Linux environments, then evaluate agent behavior. This is agentic trace evaluation in CLI environments — not text annotation.</p><h3 style=\"font-size: 16px;\">What Drafted Has That Matches</h3><ul><li><strong>Tool Call Evaluation score: 92 vs 68 baseline</strong> — the closest analog to terminal agent trace evaluation. +24 point delta over unverified annotators.</li><li><strong>Code Review sample:</strong> CS contributor identified 3 critical React bugs (stale closure, memory leak, missing error handling) with mechanism-level explanations. 11.3 min on task, 0 paste events, heuristic 96.</li><li><strong>Process Supervision sample:</strong> Caught O(n) seeded error in binary search derivation, wrote corrected steps + alternative approach. Heuristic 99, LLM-as-Judge 99.</li><li><strong>86.2 mean quality score</strong> across 5 benchmark-aligned task types (n=44 submissions).</li><li><strong>4,000+ Python contributors, 1,500+ Bash/Linux, 600+ Docker</strong> across USC, UChicago, Georgetown, UMiami.</li></ul><h3 style=\"font-size: 16px;\">Their SOW Key Clause</h3><blockquote style=\"border-left: 3px solid #888; padding-left: 12px; color: #444;\">\"Initial engagement expectations should focus on a controlled pilot and calibration period centered on quality validation and acceptance rate stabilization.\"</blockquote><p>This matches how Drafted operates exactly. Lead with calibration-first framing in your reply.</p><h3 style=\"font-size: 16px;\">What to Send Dillon Today</h3><p><strong>Propose:</strong> 20-25 screened senior contributors. Core domains: Python 3.12+, Docker, Bash, Linux, C/C++, JavaScript/Node.js, PyTorch. Rate: $32-38/hr blended.</p><p><strong>Ask 2 questions to unblock pricing:</strong></p><ol><li>Which task categories are you assigning to Drafted first — Software Engineering, ML/Data Science, Security, or a mix?</li><li>Is billing hourly or per-task completed?</li></ol><p><strong>Evidence to drop:</strong> Tool Call Evaluation cohort scored 92 vs 68 unverified baseline. Closest analog to terminal agent execution traces. Link the methodology doc if they want it before scoping.</p><h3 style=\"font-size: 16px;\">What NOT to Do</h3><ul><li>Do not offer COBOL, Coq, or OCaml. The SOW says BPOs are not expected to cover every domain. Credibility over scope.</li><li>Do not send a rate card. One blended rate only.</li><li>Do not CC Andrew unless Dillon asks for a contract counterpart.</li></ul><h3 style=\"font-size: 16px;\">Honest Coverage Map</h3><table style=\"width: 100%; border-collapse: collapse; font-size: 14px;\"><tr style=\"background: #f5f5f5;\"><th style=\"padding: 8px; text-align: left; border: 1px solid #ddd;\">Domain</th><th style=\"padding: 8px; text-align: left; border: 1px solid #ddd;\">Offer?</th><th style=\"padding: 8px; text-align: left; border: 1px solid #ddd;\">Coverage</th></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">Python 3.12+</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Yes</td><td style=\"padding: 8px; border: 1px solid #ddd;\">4,000+ contributors</td></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">Docker / containerized</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Yes (screen carefully)</td><td style=\"padding: 8px; border: 1px solid #ddd;\">600+ — tightest constraint</td></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">Bash / Linux</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Yes</td><td style=\"padding: 8px; border: 1px solid #ddd;\">1,500+ each</td></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">C/C++</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Yes</td><td style=\"padding: 8px; border: 1px solid #ddd;\">2,000+</td></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">JavaScript / Node.js</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Yes</td><td style=\"padding: 8px; border: 1px solid #ddd;\">2,000+</td></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">PyTorch / ML</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Yes</td><td style=\"padding: 8px; border: 1px solid #ddd;\">600+</td></tr><tr><td style=\"padding: 8px; border: 1px solid #ddd;\">Go / Rust</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Caution</td><td style=\"padding: 8px; border: 1px solid #ddd;\">300-500 each, thin</td></tr><tr style=\"background: #fff3f3;\"><td style=\"padding: 8px; border: 1px solid #ddd;\">COBOL / Coq / OCaml</td><td style=\"padding: 8px; border: 1px solid #ddd;\">No</td><td style=\"padding: 8px; border: 1px solid #ddd;\">Do not offer</td></tr></table><h3 style=\"font-size: 16px;\">Open Questions Before Signing</h3><ol><li>What task categories will they assign first?</li><li>Hourly vs per-task billing?</li><li>Will they provide Docker images to test contributors pre-deployment?</li><li>Gold set rubric — Snorkel provides or Drafted proposes?</li><li>Medical tasks from original scope — still in play or replaced by Terminal Bench 2.0?</li></ol><hr style=\"margin: 24px 0;\"><p style=\"font-size: 13px; color: #666;\">This brief was auto-generated from the Snorkel SOW received May 13, 2026. Full analysis: <a href=\"https://www.notion.so/3601c3